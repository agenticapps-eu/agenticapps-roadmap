name: Refresh roadmap snapshot

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC daily
    - cron: "0 6 * * *"

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch Linear snapshot
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: pnpm sync:snapshot

      - name: Commit snapshot if changed
        run: |
          git diff --quiet public/roadmap.json && echo "No changes" && exit 0
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/roadmap.json
          git commit -m "chore: refresh roadmap snapshot [skip ci]"
          git push
